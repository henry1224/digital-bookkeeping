openapi: 3.0.3
info:
  title: JJ Steak Digital Bookkeeping API
  version: 0.1.0
  description: Kontrak API internal untuk backoffice Laravel + Inertia. Inertia page boleh memakai web routes, tetapi spec ini mendefinisikan payload utama.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /daily-sales:
    post:
      summary: Membuat ringkasan penjualan harian
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailySaleCreate'
      responses:
        '201':
          description: Berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailySale'
  /payment-requests:
    post:
      summary: Mengajukan payment request
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequestCreate'
      responses:
        '201':
          description: Berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequest'
  /purchase-orders:
    post:
      summary: Membuat purchase order
      tags: [Logistics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseOrderCreate'
      responses:
        '201':
          description: Berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
  /receivings:
    post:
      summary: Mencatat receiving stock dari PO
      tags: [Logistics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceivingCreate'
      responses:
        '201':
          description: Berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receiving'
  /journals:
    post:
      summary: Membuat manual journal
      tags: [Accounting]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualJournalCreate'
      responses:
        '201':
          description: Berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Journal'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Money:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
      example: '125000.00'
      description: Nilai uang sebagai string decimal. Jangan kirim float.
    Quantity:
      type: string
      pattern: '^\d+(\.\d{1,4})?$'
      example: '2.5000'
    DailySaleCreate:
      type: object
      required: [outlet_id, sale_date, payment_breakdowns, lines]
      properties:
        outlet_id: { type: integer, format: int64 }
        sale_date: { type: string, format: date }
        shift_code: { type: string, nullable: true, example: 'SHIFT-1' }
        notes: { type: string, nullable: true }
        payment_breakdowns:
          type: array
          minItems: 1
          items:
            type: object
            required: [method, amount]
            properties:
              method: { type: string, enum: [cash, debit, credit, qris, transfer] }
              amount: { $ref: '#/components/schemas/Money' }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [item_id, qty, unit_price_amount]
            properties:
              item_id: { type: integer, format: int64 }
              qty: { $ref: '#/components/schemas/Quantity' }
              unit_price_amount: { $ref: '#/components/schemas/Money' }
    DailySale:
      allOf:
        - $ref: '#/components/schemas/DailySaleCreate'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            status: { type: string, enum: [draft, submitted, posted, cancelled] }
            net_sales_amount: { $ref: '#/components/schemas/Money' }
            pb1_amount: { $ref: '#/components/schemas/Money' }
    PaymentRequestCreate:
      type: object
      required: [request_type, amount, description]
      description: Untuk `supplier_payment`, isi `supplier_id`. Untuk `non_stock_expense`, isi `expense_account_id`.
      properties:
        request_type: { type: string, enum: [supplier_payment, non_stock_expense] }
        outlet_id: { type: integer, format: int64, nullable: true }
        supplier_id: { type: integer, format: int64, nullable: true }
        expense_account_id: { type: integer, format: int64, nullable: true }
        amount: { $ref: '#/components/schemas/Money' }
        due_date: { type: string, format: date, nullable: true }
        description: { type: string, minLength: 3 }
        attachment_ids:
          type: array
          items: { type: integer, format: int64 }
    PaymentRequest:
      allOf:
        - $ref: '#/components/schemas/PaymentRequestCreate'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            request_no: { type: string }
            status: { type: string, enum: [draft, submitted, approved, rejected, paid, cancelled] }
    PurchaseOrderCreate:
      type: object
      required: [outlet_id, supplier_id, po_date, lines]
      properties:
        outlet_id: { type: integer, format: int64 }
        supplier_id: { type: integer, format: int64 }
        po_date: { type: string, format: date }
        notes: { type: string, nullable: true }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [item_id, qty, unit_cost_amount]
            properties:
              item_id: { type: integer, format: int64 }
              qty: { $ref: '#/components/schemas/Quantity' }
              unit_cost_amount: { $ref: '#/components/schemas/Money' }
    PurchaseOrder:
      allOf:
        - $ref: '#/components/schemas/PurchaseOrderCreate'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            po_no: { type: string }
            status: { type: string, enum: [draft, submitted, approved, partially_received, received, cancelled] }
            total_amount: { $ref: '#/components/schemas/Money' }
    ReceivingCreate:
      type: object
      required: [purchase_order_id, received_at, lines]
      properties:
        purchase_order_id: { type: integer, format: int64 }
        received_at: { type: string, format: date-time }
        notes: { type: string, nullable: true }
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required: [purchase_order_line_id, item_id, qty, unit_cost_amount]
            properties:
              purchase_order_line_id: { type: integer, format: int64 }
              item_id: { type: integer, format: int64 }
              qty: { $ref: '#/components/schemas/Quantity' }
              unit_cost_amount: { $ref: '#/components/schemas/Money' }
    Receiving:
      allOf:
        - $ref: '#/components/schemas/ReceivingCreate'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            receiving_no: { type: string }
            status: { type: string, enum: [draft, posted, cancelled] }
            total_amount: { $ref: '#/components/schemas/Money' }
    ManualJournalCreate:
      type: object
      required: [journal_date, description, lines]
      properties:
        journal_date: { type: string, format: date }
        description: { type: string, minLength: 3 }
        lines:
          type: array
          minItems: 2
          items:
            type: object
            required: [account_id]
            properties:
              account_id: { type: integer, format: int64 }
              debit_amount: { $ref: '#/components/schemas/Money' }
              credit_amount: { $ref: '#/components/schemas/Money' }
              description: { type: string, nullable: true }
    Journal:
      allOf:
        - $ref: '#/components/schemas/ManualJournalCreate'
        - type: object
          properties:
            id: { type: integer, format: int64 }
            journal_no: { type: string }
            status: { type: string, enum: [draft, pending_approval, posted, reversed, cancelled] }
            total_debit_amount: { $ref: '#/components/schemas/Money' }
            total_credit_amount: { $ref: '#/components/schemas/Money' }
